<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Subir Video | JardinTV</title>

<link rel="stylesheet" href="/static/style.css">

</head>


<body>


<header class="navbar">

<div class="logo">
🌿 <span>JardinTV</span>
</div>


<nav>

<a href="/">🏠 Inicio</a>

<a href="/upload">📤 Subir video</a>

<a href="/watch">🎥 Videos</a>

</nav>


</header>



<section class="upload-section">


<div class="upload-card">


<h1>📤 Subir un video</h1>


<p>
Comparte tu jardín, plantas o ideas con la comunidad 🌱
</p>



<form method="POST" enctype="multipart/form-data">


<label>
Título del video
</label>

<input 
type="text"
placeholder="Ejemplo: Mi jardín en primavera"
>


<label>
Descripción
</label>

<textarea
placeholder="Cuéntanos sobre tu jardín..."
></textarea>



<label>
Selecciona tu video
</label>


<input 
type="file"
name="video"
accept="video/*"
required
>



<button class="btn">

🚀 Publicar video

</button>


</form>


</div>


</section>



<footer>

<p>
© 2026 JardinTV 🌿
</p>

</footer>



</body>

</html>
